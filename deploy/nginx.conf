server {
    listen 80;
    server_name example.com;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name example.com;

    root /var/www/settlement-site;
    index index.html;

    # SSL сертификаты (укажи свои пути)
    ssl_certificate /etc/letsencrypt/live/example.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/example.com/privkey.pem;

    server_tokens off;
    autoindex off;

    # Безопасные заголовки для статического сайта
    add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com data:; img-src 'self' data:; connect-src 'self'; object-src 'none'; base-uri 'self'; frame-ancestors 'none'; form-action 'self'; upgrade-insecure-requests" always;
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "geolocation=(), microphone=(), camera=(), payment=(), usb=(), accelerometer=(), gyroscope=(), magnetometer=()" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;

    # Сжатие
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css application/javascript application/json application/xml image/svg+xml;

    # Отдача только существующих файлов
    location / {
        try_files $uri $uri/ =404;
    }

    # PDF скачиваются, а не открываются
    location ~* \.pdf$ {
        add_header Content-Disposition "attachment" always;
        try_files $uri =404;
    }

    # JSON с лицевыми счетами публичен, потому что нужен клиентскому поиску.
    # Риск можно снизить: хранить только минимально нужные поля (fio, account), без лишних персональных данных.
    location = /data/accounts.json {
        try_files $uri =404;
    }

    # Кэш статических ресурсов
    location ~* \.(?:css|js|svg|png|jpg|jpeg|gif|webp|woff2?)$ {
        expires 30d;
        add_header Cache-Control "public, max-age=2592000, immutable";
        try_files $uri =404;
    }

    # HTML лучше без долгого кэша
    location ~* \.html$ {
        expires -1;
        add_header Cache-Control "no-cache";
        try_files $uri =404;
    }
}
